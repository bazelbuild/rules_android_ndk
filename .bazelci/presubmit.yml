---
buildifier: latest
tasks:
  ubuntu1804-basic:
    working_directory: examples/basic
    platform: ubuntu1804
    environment:
      ANDROID_NDK_HOME: /opt/android-ndk-r25b
    build_flags:
      - "--noincompatible_enable_cc_toolchain_resolution"
      - "--fat_apk_cpu=arm64-v8a,x86"
      - "--android_crosstool_top=@androidndk//:toolchain"
    build_targets:
    - "//java/com/app:app"
  ubuntu1804-rules_foreign_cc:
    working_directory: examples/rules_foreign_cc
    platform: ubuntu1804
    environment:
      ANDROID_NDK_HOME: /opt/android-ndk-r25b
    build_flags:
      - "--noincompatible_enable_cc_toolchain_resolution"
      - "--fat_apk_cpu=arm64-v8a,x86"
      - "--android_crosstool_top=@androidndk//:toolchain"
    build_targets:
    - "//java/com/app:app"
  macos-basic:
    working_directory: examples/basic
    platform: macos
    environment:
      ANDROID_NDK_HOME: /Users/buildkite/android-ndk-r25b
    build_flags:
      - "--noincompatible_enable_cc_toolchain_resolution"
      - "--fat_apk_cpu=arm64-v8a,x86"
      - "--android_crosstool_top=@androidndk//:toolchain"
    build_targets:
    - "//java/com/app:app"
  macos-rules_foreign_cc:
    working_directory: examples/rules_foreign_cc
    platform: macos
    environment:
      ANDROID_NDK_HOME: /Users/buildkite/android-ndk-r25b
    build_flags:
      - "--noincompatible_enable_cc_toolchain_resolution"
      - "--fat_apk_cpu=arm64-v8a,x86"
      - "--android_crosstool_top=@androidndk//:toolchain"
    build_targets:
    - "//java/com/app:app"
