---
buildifier: latest
matrix:
  bazel: [
    7.4.1,
    8.6.0,
    last_green,
  ]

basic_example: &basic_example
  working_directory: examples/basic
  build_flags:
    - "--incompatible_disallow_empty_glob"
    - "--android_platforms=//:arm64-v8a,//:x86"
  build_targets:
    - "//java/com/app:app"

basic_example_bzlmod: &basic_example_bzlmod
  working_directory: examples/basic
  build_flags:
    - "--incompatible_disallow_empty_glob"
    - "--android_platforms=//:arm64-v8a,//:x86"
  build_targets:
    - "//java/com/app:app"

cpu_features: &cpu_features
  working_directory: examples/cpu_features
  build_flags:
    - "--incompatible_disallow_empty_glob"
    - "--platforms=//:arm64-v8a"
    - "--enable_workspace=True"
  build_targets:
    - "//:all"

toolchain_features: &toolchain_features
  working_directory: examples/toolchain_features
  build_flags:
    - "--incompatible_disallow_empty_glob"
    - "--android_platforms=//:arm64-v8a,//:x86"
    - "--enable_bzlmod=True"
  build_targets:
    - "//java/com/app:app"

ubuntu2404: &ubuntu2404
  platform: ubuntu2404
  environment:
    ANDROID_NDK_HOME: /opt/android-ndk-r25b

macos: &macos
  platform: macos_arm64
  environment:
    ANDROID_NDK_HOME: /Users/buildkite/android-ndk-r25b

windows: &windows
  platform: windows
  environment:
    ANDROID_NDK_HOME: c:/android_ndk/r25b
    BAZELCI_LOCAL_RUN: true

tasks:
  basic_example_ubuntu2404:
    name: Basic Example
    bazel: ${{ bazel }}
    <<: [*ubuntu2404, *basic_example]
  basic_example_bzlmod_ubuntu2404:
    name: Basic Example Bzlmod
    bazel: ${{ bazel }}
    <<: [*ubuntu2404, *basic_example_bzlmod]
  basic_example_macos:
    name: Basic Example
    bazel: ${{ bazel }}
    <<: [*macos, *basic_example]
  basic_example_bzlmod_macos:
    name: Basic Example Bzlmod
    bazel: ${{ bazel }}
    <<: [*macos, *basic_example_bzlmod]
  basic_example_windows:
    name: Basic Example
    bazel: ${{ bazel }}
    <<: [*windows, *basic_example]
  basic_example_bzlmod_windows:
    name: Basic Example Bzlmod
    bazel: ${{ bazel }}
    <<: [*windows, *basic_example_bzlmod]


  cpu_features_ubuntu2404:
    name: CPU Features
    bazel: ${{ bazel }}
    <<: [*ubuntu2404, *cpu_features]
  cpu_features_macos:
    name: CPU Features
    bazel: ${{ bazel }}
    <<: [*macos, *cpu_features]

  toolchain_features_ubuntu2404:
    name: Toolchain Features
    bazel: ${{ bazel }}
    <<: [*ubuntu2404, *toolchain_features]
  toolchain_features_macos:
    name: Toolchain Features
    bazel: ${{ bazel }}
    <<: [*macos, *toolchain_features]
  toolchain_features_windows:
    name: Toolchain Features
    bazel: ${{ bazel }}
    <<: [*windows, *toolchain_features]
